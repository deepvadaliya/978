<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>

    <!-- Bubble Background -->

    <!-- Website Content -->
    <header>
        <h1>🍽 Food Paradise</h1>

    <section class="food-items">
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?pizza" alt="Pizza">
            <h3>Cheesy Pizza</h3>
            <p>Hot, cheesy and loaded with toppings.</p>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?burger" alt="Burger">
            <h3>Juicy Burger</h3>
            <p>Freshly grilled patty with crispy fries.</p>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?pasta" alt="Pasta">
            <h3>Italian Pasta</h3>
            <p>Perfectly cooked pasta in creamy sauce.</p>
        </div>
